<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Voice Agent Dev Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<header>
  <h1>Voice Agent Dev Console</h1>
  <div id="status">disconnected</div>
</header>

<main>
  <aside id="panel">
    <h2>Persona</h2>

    <label>
      Preset
      <select id="preset"></select>
    </label>

    <label>
      Voice (Smallest.ai)
      <select id="voice"></select>
    </label>

    <label>
      LLM model (Groq)
      <select id="model"></select>
    </label>

    <label>
      Temperature <span id="tempVal">0.4</span>
      <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.4" />
    </label>

    <label>
      Greeting (optional override)
      <textarea id="greeting" rows="2" placeholder="Leave blank for preset default"></textarea>
    </label>

    <label>
      System prompt
      <textarea id="systemPrompt" rows="14"></textarea>
    </label>

    <div class="buttons">
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn" disabled>Disconnect</button>
    </div>

    <p class="hint">Agent name: <code id="agentNameLabel">tonys-pizza-agent</code></p>
  </aside>

  <section id="chat">
    <div id="transcript"></div>
    <div id="micRow">
      <div id="micIndicator">🎙️</div>
      <button id="muteBtn" class="mic-btn" disabled>Mute</button>
      <div id="hint">Click Connect to talk to the agent.</div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.10/dist/livekit-client.umd.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
